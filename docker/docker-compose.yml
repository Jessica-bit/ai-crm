services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_crm
    ports:
      - "5432:5432"
    volumes:
      - ai_crm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ai_crm_postgres_data:
